<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="search-panel" aria-label="Weather search">
        <div class="brand-row">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M30.6 14.8A12.4 12.4 0 0 0 6.3 18.5a9.2 9.2 0 0 0 2.9 17.9h23.5a10.8 10.8 0 0 0-2.1-21.6Z" fill="#f7c948"/>
              <path d="M18.8 17.1A10.2 10.2 0 1 1 29 27.3H15.2a7 7 0 1 1 1.9-13.7 10.2 10.2 0 0 1 1.7 3.5Z" fill="#ffffff" opacity=".92"/>
              <path d="M30.8 20.3a8 8 0 0 1 1.6-.2 8.3 8.3 0 0 1 0 16.6H14.2a6.8 6.8 0 0 1-.4-13.6 10.9 10.9 0 0 1 17-2.8Z" fill="#78a6c8"/>
            </svg>
          </div>
          <div>
            <p class="eyebrow">Live conditions</p>
            <h1>Weather Dashboard</h1>
          </div>
        </div>

        <form id="weather-form" class="search-form">
          <label for="city-input">City</label>
          <div class="search-row">
            <input id="city-input" name="city" type="search" autocomplete="off" placeholder="Search a city" value="New York">
            <button type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>Search</span>
            </button>
          </div>
        </form>

        <div class="status-line" id="status-line" role="status" aria-live="polite"></div>
      </section>

      <section class="dashboard-grid" aria-label="Current weather">
        <article class="current-panel">
          <div class="location-row">
            <div>
              <p class="eyebrow">Selected location</p>
              <h2 id="location-name">Loading...</h2>
            </div>
            <div class="weather-art" id="weather-art" aria-hidden="true"></div>
          </div>

          <div class="temperature-row">
            <p id="temperature">--</p>
            <div>
              <span id="condition">Waiting for weather data</span>
              <small id="observed-time">--</small>
            </div>
          </div>
        </article>

        <article class="metric-card">
          <span class="metric-icon humidity" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2.8s6.4 7 6.4 12a6.4 6.4 0 1 1-12.8 0c0-5 6.4-12 6.4-12Z" fill="currentColor"/></svg>
          </span>
          <p>Humidity</p>
          <strong id="humidity">--</strong>
        </article>

        <article class="metric-card">
          <span class="metric-icon wind" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 8h10.5a2.5 2.5 0 1 0-2.5-2.5M3 13h15.5a2.5 2.5 0 1 1-2.5 2.5M3 18h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <p>Wind Speed</p>
          <strong id="wind-speed">--</strong>
        </article>

        <article class="metric-card">
          <span class="metric-icon pressure" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16Zm0 4v4l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <p>Pressure</p>
          <strong id="pressure">--</strong>
        </article>

        <article class="metric-card">
          <span class="metric-icon feels" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M14 14.8V5a4 4 0 0 0-8 0v9.8a6 6 0 1 0 8 0Z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 6v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <p>Feels Like</p>
          <strong id="feels-like">--</strong>
        </article>

        <article class="forecast-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Next hours</p>
              <h2>Temperature Trend</h2>
            </div>
          </div>
          <div id="hourly-list" class="hourly-list"></div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
